---
- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Check if Docker is installed
  ansible.builtin.command: docker --version
  register: docker_check
  changed_when: false
  failed_when: false

- name: Install Docker via get.docker.com
  ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
  when: docker_check.rc != 0

- name: Ensure /opt/guacamole exists
  ansible.builtin.file:
    path: /opt/guacamole
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/guacamole/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart Guacamole

- name: Render connection seed SQL
  ansible.builtin.template:
    src: seed-connections.sql.j2
    dest: /opt/guacamole/seed-connections.sql
    owner: root
    group: root
    mode: "0640"

- name: Enable and start Guacamole via Docker Compose
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Bring up Guacamole stack
  ansible.builtin.command:
    cmd: docker compose up -d --pull missing
    chdir: /opt/guacamole
  register: compose_up
  changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout"
