---
- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Check if Docker is installed
  ansible.builtin.command: docker --version
  register: docker_check
  changed_when: false
  failed_when: false

- name: Install Docker via get.docker.com
  ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
  when: docker_check.rc != 0

- name: Ensure /opt/guacamole exists
  ansible.builtin.file:
    path: /opt/guacamole
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/guacamole/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart Guacamole

- name: Render connection seed SQL
  ansible.builtin.template:
    src: seed-connections.sql.j2
    dest: /opt/guacamole/seed-connections.sql
    owner: root
    group: root
    mode: "0640"

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Bring up Guacamole stack
  ansible.builtin.command:
    cmd: docker compose up -d --pull missing
    chdir: /opt/guacamole
  register: compose_up
  changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout"

- name: Wait for Guacamole database to accept connections
  ansible.builtin.command:
    cmd: docker compose exec -T db pg_isready -U guacamole_user -d guacamole_db
    chdir: /opt/guacamole
  register: pg_ready
  until: pg_ready.rc == 0
  retries: 15
  delay: 4
  changed_when: false

# ---------------------------------------------------------------------------
# Schema initialization — idempotent: only runs when schema is absent.
# The guacamole/guacamole image ships initdb.sh to generate PostgreSQL DDL.
# ---------------------------------------------------------------------------

- name: Check if Guacamole schema is already initialized
  ansible.builtin.command:
    cmd: >
      docker compose exec -T db psql -U guacamole_user -d guacamole_db
      -tAc "SELECT 1 FROM information_schema.tables WHERE table_name='guacamole_user'"
    chdir: /opt/guacamole
  register: schema_check
  changed_when: false
  failed_when: false

- name: Generate Guacamole schema SQL from image
  ansible.builtin.shell:
    cmd: >
      docker run --rm guacamole/guacamole
      /opt/guacamole/bin/initdb.sh --postgresql
      > /opt/guacamole/initdb.sql
  when: "'1' not in schema_check.stdout"

- name: Apply Guacamole schema SQL
  ansible.builtin.command:
    cmd: >
      docker compose exec -T db psql -U guacamole_user -d guacamole_db
      -f /opt/guacamole/initdb.sql
    chdir: /opt/guacamole
  when: "'1' not in schema_check.stdout"

# ---------------------------------------------------------------------------
# Admin password bootstrap — runs every time (always sets password from state).
# ---------------------------------------------------------------------------

- name: Bootstrap Guacamole admin password
  ansible.builtin.shell: |
    python3 -c "
    import hashlib, secrets, subprocess, os
    pw = os.environ['GUAC_ADMIN_PW'].encode()
    salt = secrets.token_bytes(32)
    h = hashlib.sha256(pw + salt).digest()
    sql = (
        \"UPDATE guacamole_user SET \"
        \"password_hash = DECODE('\" + h.hex() + \"', 'hex'), \"
        \"password_salt = DECODE('\" + salt.hex() + \"', 'hex'), \"
        \"password_date = NOW() \"
        \"WHERE entity_id = (SELECT entity_id FROM guacamole_entity WHERE name = 'guacadmin');\"
    )
    subprocess.run(
        ['docker', 'compose', 'exec', '-T', 'db', 'psql',
         '-U', 'guacamole_user', '-d', 'guacamole_db', '-c', sql],
        check=True, cwd='/opt/guacamole'
    )
    "
  environment:
    GUAC_ADMIN_PW: "{{ net.guacamole_admin_password }}"
  args:
    chdir: /opt/guacamole
  no_log: true
  changed_when: false
  when: net.guacamole_admin_password is defined and net.guacamole_admin_password

# ---------------------------------------------------------------------------
# Seed connections — idempotent via ON CONFLICT DO NOTHING.
# ---------------------------------------------------------------------------

- name: Seed Guacamole connections from network state
  ansible.builtin.command:
    cmd: >
      docker compose exec -T db psql -U guacamole_user -d guacamole_db
      -f /opt/guacamole/seed-connections.sql
    chdir: /opt/guacamole
  changed_when: false
