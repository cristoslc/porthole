---
# Guacamole Remote Desktop Gateway — hub deployment
# All services bind to 10.100.0.1 (WireGuard) or 127.0.0.1 (loopback only).
# No services are exposed on the public interface.

services:
  guacd:
    image: guacamole/guacd:1.5.5
    container_name: guacd
    restart: unless-stopped
    networks:
      - guac_net

  postgres:
    image: postgres:16-alpine
    container_name: guac_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    shm_size: 128mb
    networks:
      - guac_net

  guacamole:
    image: guacamole/guacamole:1.5.5
    container_name: guacamole
    restart: unless-stopped
    depends_on:
      - guacd
      - postgres
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRES_DATABASE: guacamole_db
      POSTGRES_HOSTNAME: postgres
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TOTP_ENABLED: "true"
      TOTP_PERIOD: "30"
      TOTP_DIGITS: "6"
    volumes:
      - ./guacamole-home:/etc/guacamole:ro
    networks:
      - guac_net

  caddy:
    image: ghcr.io/cristoslc/xcaddy-cloudflare:latest
    # Custom build: xcaddy with caddy-dns/cloudflare plugin.
    # Build with: xcaddy build --with github.com/caddy-dns/cloudflare
    # Or use: docker build -f Dockerfile.caddy .
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - guacamole
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    ports:
      # Bind ONLY to WireGuard interface
      - "10.100.0.1:443:443"
      - "10.100.0.1:80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - guac_net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  guac_net:
    driver: bridge
    internal: true
