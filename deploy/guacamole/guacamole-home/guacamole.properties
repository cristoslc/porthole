# Guacamole configuration
# This file is mounted read-only into the container.

# Authentication: PostgreSQL database
auth-provider: net.sourceforge.guacamole.net.auth.postgresql.PostgreSQLAuthenticationProvider

# TOTP two-factor authentication extension
# Loaded automatically when .jar is placed in extensions/
# TOTP bypass for WireGuard subnet (10.100.0.0/24) is handled via
# guacamole-auth-totp configuration — set exempt-net=10.100.0.0/24

# Allow connections from WireGuard subnet without TOTP
totp-exempt-networks: 10.100.0.0/24
